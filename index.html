<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tamires Enxovais</title>
<meta name="description" content="Loja virtual - Lençóis, Toalhas, Mantas, Cortinas, Colchas e Edredons." />
<link rel="preconnect" href="https://arquivos-cdn.facilzap.app.br/" crossorigin="">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{cursor:pointer;font-family:inherit;border:none;background:none}
  img{display:block;max-width:100%}
  input,textarea,select{font-family:inherit}
  .container{max-width:1280px;margin:0 auto;padding:0 16px}
  .scrollbar-hide::-webkit-scrollbar{display:none}.scrollbar-hide{scrollbar-width:none}

  .marquee{background:#000;color:#fff;padding:8px 0;overflow:hidden}
  .marquee-track{display:flex;white-space:nowrap;animation:marquee 35s linear infinite}
  .marquee-track span{margin:0 32px;font-size:13px;font-weight:500}
  @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

  header.main{position:sticky;top:0;z-index:40;background:#000;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.2)}
  .topbar{border-bottom:1px solid #27272a}
  .topbar .container{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;font-size:12px}
  .topbar .links{display:flex;gap:24px}
  .topbar .links button{color:#fff;display:flex;align-items:center;gap:6px;font-size:12px;transition:color .2s}
  .topbar .links button:hover{color:#666}
  .social-icons{display:flex;gap:12px;align-items:center}
  .social-icons a{color:#fff;transition:opacity .2s}
  .social-icons a.fb{color:#fff}
  .whats-icon-link{background:#25D366;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;transition:transform .2s}
  .whats-icon-link:hover{transform:scale(1.05);background:#1ebe5d}
  .whats-icon-link img{width:18px;height:18px}
  .whats-icon-text{display:inline-flex;align-items:center;gap:6px;background:#25D366;padding:4px 10px;border-radius:20px;color:#fff;font-weight:500;transition:transform .2s}
  .whats-icon-text:hover{transform:scale(1.02);background:#1ebe5d}
  .whats-icon-text img{width:18px;height:18px}
  .cart-info{display:flex;align-items:center;gap:8px;font-weight:600;transition:color .2s;position:relative;cursor:pointer}
  .cart-info:hover{color:#666}
  .cart-info .lock-icon{cursor:pointer;display:inline-flex;align-items:center}

  .header-main{display:grid;grid-template-columns:1fr 2fr 1fr;gap:16px;align-items:center;padding:16px}
  .logo-area{display:flex;flex-direction:column}
  .logo-imgs{display:flex}.logo-imgs img{width:48px;height:48px;border-radius:6px;border:2px solid #fff;object-fit:cover;margin-left:-8px}
  .logo-imgs img:first-child{margin-left:0}
  .logo-area h1{font-size:20px;margin-top:4px}
  .logo-area p{font-size:10px;color:#a1a1aa}
  .search-form{position:relative}
  .search-form input{width:100%;padding:10px 50px 10px 16px;border-radius:6px;border:none;font-size:14px;outline:none;background:#1a1a1a;color:#fff}
  .search-form input::placeholder{color:#666}
  .search-form input:focus{box-shadow:0 0 0 2px #666}
  .search-form button{position:absolute;right:4px;top:50%;transform:translateY(-50%);background:transparent;padding:8px;border-radius:4px;color:#fff;display:flex;align-items:center;transition:filter .2s}
  .search-form button svg{stroke:#fff;fill:none}
  .search-form button:hover{filter:brightness(1.2)}
  .header-right{display:flex;justify-content:flex-end;gap:16px;font-size:12px}
  .header-right button,.header-right a{display:flex;align-items:center;gap:8px;color:#fff;transition:color .2s}
  .header-right button:hover,.header-right a:hover{color:#666}

  .nav-bar{background:#18181b;color:#fff;position:sticky;top:148px;z-index:30;box-shadow:0 2px 6px rgba(0,0,0,.1)}
  .nav-bar nav{display:flex;align-items:center;gap:4px;overflow-x:auto}
  .nav-bar nav button{padding:12px 16px;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;transition:background .2s;display:flex;align-items:center;gap:6px}
  .nav-bar nav button:hover{background:#000}
  .more-menu{position:relative}
  .more-menu .dropdown{position:absolute;left:0;top:100%;background:#18181b;border:1px solid #3f3f46;border-radius:0 0 6px 6px;min-width:200px;opacity:0;visibility:hidden;transition:all .2s;z-index:50}
  .more-menu:hover .dropdown{opacity:1;visibility:visible}
  .more-menu .dropdown button{display:block;width:100%;text-align:left;padding:10px 16px;font-size:13px}
  .more-menu .more-btn{display:flex;align-items:center;gap:6px}
  .more-menu .more-btn svg:last-child{display:none}

  .cat-circles{background:#fff;border-bottom:1px solid #e4e4e7}
  .cat-circles .container{padding:16px;position:relative}
  .cat-scroll{display:flex;gap:24px;overflow-x:auto;padding:0 40px;scroll-behavior:smooth}
  .cat-item{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0}
  .cat-item .circle{width:80px;height:80px;border-radius:50%;overflow:hidden;border:2px solid #e4e4e7;transition:all .3s;background:#fff}
  .cat-item:hover .circle{border-color:#000;transform:scale(1.05)}
  .cat-item span{font-size:11px;font-weight:600;color:#3f3f46}
  .cat-item:hover span{color:#000}
  .scroll-btn{position:absolute;top:50%;transform:translateY(-50%);background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);border-radius:50%;padding:8px;z-index:10;display:flex;align-items:center;justify-content:center}
  .scroll-btn:hover{background:#f4f4f5}
  .scroll-btn.left{left:24px}.scroll-btn.right{right:24px}

  .filter-modal{max-width:600px;max-height:80vh;overflow-y:auto}
  .filter-group{margin-bottom:20px;border-bottom:1px solid #3f3f46;padding-bottom:16px}
  .filter-group h4{font-size:14px;font-weight:600;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .filter-group h4 span{color:#a1a1aa;font-size:12px}
  .filter-chips{display:flex;flex-wrap:wrap;gap:8px}
  .filter-chip{background:#0d0d0d;border:1px solid #3f3f46;border-radius:20px;padding:6px 14px;font-size:12px;color:#e4e4e7;cursor:pointer;transition:all .2s}
  .filter-chip:hover{background:#2a2a2a;border-color:#666}
  .filter-chip.active{background:#000;border-color:#fff;color:#fff}
  .filter-actions{display:flex;gap:12px;margin-top:20px;padding-top:16px;border-top:1px solid #3f3f46}
  .filter-actions button{flex:1;padding:10px;border-radius:6px;font-weight:600}
  .apply-filter-btn{background:#000;color:#fff;border:1px solid #fff}
  .clear-filter-btn{background:#1a1a1a;color:#a1a1aa;border:1px solid #3f3f46}
  .filter-bar{display:flex;justify-content:flex-end;align-items:center;gap:12px;padding:16px 0;margin-top:16px}
  .filter-bar .filter-btn{font-size:13px;border:1px solid #3f3f46;border-radius:4px;padding:6px 12px;background:#1a1a1a;color:#fff;outline:none;cursor:pointer}
  .filter-bar select{font-size:13px;border:1px solid #3f3f46;border-radius:4px;padding:6px 12px;background:#1a1a1a;color:#fff;outline:none}
  .filter-bar select:focus{border-color:#666}
  .filter-bar select option{background:#1a1a1a}
  .active-filters{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .active-filter-tag{background:#1a1a1a;border:1px solid #3f3f46;border-radius:16px;padding:4px 12px;font-size:11px;color:#e4e4e7;display:flex;align-items:center;gap:6px}
  .active-filter-tag button{background:none;color:#a1a1aa;font-size:14px;padding:0 4px}

  section.products{padding:24px 0}
  section.products h2.section-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #fff;display:inline-block}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
  @media (max-width:1024px){.grid{grid-template-columns:repeat(4,1fr)}}
  @media (max-width:768px){.grid{grid-template-columns:repeat(3,1fr)}.header-main{grid-template-columns:1fr}.nav-bar{top:auto;position:relative}}
  @media (max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}}

  .card{background:#fff;border:1px solid #e4e4e7;border-radius:8px;overflow:hidden;transition:all .3s;display:flex;flex-direction:column;cursor:pointer}
  .card:hover{box-shadow:0 10px 25px rgba(0,0,0,.1);border-color:#000}
  .card .img-wrap{position:relative;aspect-ratio:1/1;overflow:hidden;background:#fafafa}
  .card .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
  .card:hover .img-wrap img{transform:scale(1.05)}
  .badge{position:absolute;top:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff;z-index:2}
  .badge.feat{left:8px;background:#000}
  .badge.disc{right:8px;background:#dc2626}
  .card-body{padding:12px;display:flex;flex-direction:column;flex:1}
  .card-body h3{font-size:13px;font-weight:500;color:#18181b;line-height:1.3;min-height:34px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:color .2s}
  .card:hover .card-body h3{color:#000}
  .price-area{margin-top:8px;flex:1}
  .from-text,.old-price{font-size:11px;color:#71717a}
  .old-price{text-decoration:line-through;margin-right:6px}
  .disc-tag{font-size:11px;background:#fee2e2;color:#b91c1c;padding:1px 6px;border-radius:3px;font-weight:600;margin-right:6px}
  .new-price{font-size:18px;font-weight:700;color:#000;display:block;margin-top:2px}
  .sales{font-size:11px;color:#71717a;margin-top:4px}
  .buy-btn{margin-top:12px;width:100%;background:#000;color:#fff;font-size:13px;font-weight:600;padding:8px;border-radius:4px;display:flex;align-items:center;justify-content:center;gap:8px;transition:filter .2s}
  .buy-btn:hover{filter:brightness(1.2)}

  .wa-float{position:fixed;bottom:80px;left:16px;z-index:50;background:#25D366;width:56px;height:56px;border-radius:50%;box-shadow:0 6px 16px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;transition:transform .2s;border:none}
  .wa-float:hover{transform:scale(1.05);background:#1ebe5d}
  .wa-float img{width:32px;height:32px}
  
  .app-float{position:fixed;bottom:80px;right:16px;z-index:51;background:#1a1a1a;border-radius:12px;box-shadow:0 6px 16px rgba(0,0,0,.3);display:flex;align-items:center;gap:12px;padding:8px 16px 8px 8px;border:1px solid #3f3f46;cursor:pointer;transition:transform .2s;animation:slideInRight 0.5s ease-out}
  .app-float:hover{transform:scale(1.05);background:#2a2a2a}
  .app-float img{width:48px;height:48px;border-radius:10px;object-fit:cover}
  .app-float .app-text{display:flex;flex-direction:column}
  .app-float .app-text strong{font-size:14px;font-weight:700;color:#fff}
  .app-float .app-text span{font-size:11px;color:#a1a1aa}
  .app-float.hide{display:none}
  @keyframes slideInRight{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

  .install-modal .modal{max-width:500px}
  .install-modal .app-icon{width:48px;height:48px;border-radius:12px;margin:0}
  .install-buttons{display:flex;gap:12px;margin-top:24px}
  .install-buttons button{flex:1;padding:12px;border-radius:8px;font-weight:600}
  .install-btn{background:#25d366;color:#fff}
  .cancel-btn{background:#1a1a1a;color:#a1a1aa;border:1px solid #3f3f46}

  .rastreio-modal .modal{max-width:500px}
  .rastreio-steps{list-style:none;margin:0;padding:0}
  .rastreio-steps li{display:flex;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #3f3f46}
  .rastreio-steps li:last-child{border-bottom:none}
  .step-number{width:32px;height:32px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
  .step-text{flex:1}
  .step-text strong{display:block;color:#fff;margin-bottom:4px}
  .step-text p{font-size:13px;color:#a1a1aa;line-height:1.4}
  .playstore-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#25D366;color:#fff;padding:14px;border-radius:8px;font-weight:700;font-size:16px;margin-top:16px;cursor:pointer;text-decoration:none;border:none}
  .playstore-btn:hover{background:#1ebe5d}

  .live-notif{position:fixed;top:80px;right:16px;z-index:55;background:#1a1a1a;color:#fff;border-radius:12px;box-shadow:0 12px 32px rgba(0,0,0,.5);padding:10px 14px 10px 10px;display:flex;align-items:center;gap:10px;max-width:320px;animation:notifIn .45s cubic-bezier(.2,.9,.3,1);border:1px solid #3f3f46}
  .live-notif.out{animation:notifOut .35s ease forwards}
  .live-notif img{width:46px;height:46px;border-radius:8px;object-fit:cover;flex-shrink:0}
  .live-notif .ln-text{flex:1;font-size:12px;line-height:1.35;color:#e4e4e7}
  .live-notif .ln-text b{font-weight:700;display:block;font-size:13px;color:#fff}
  .live-notif .ln-text .city{color:#a1a1aa;font-size:11px;margin-top:1px}
  .live-notif .ln-text .item{color:#fff;font-weight:600;margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .live-notif .ln-close{position:absolute;top:4px;right:6px;color:#a1a1aa;font-size:14px;line-height:1;cursor:pointer}
  .live-notif .ln-close:hover{color:#fff}
  @keyframes notifIn{from{transform:translateX(380px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes notifOut{to{transform:translateX(380px);opacity:0}}

  .info-modal{max-width:520px;background:#1a1a1a;color:#fff}
  .info-modal h3{font-size:20px;border-bottom:1px solid #3f3f46;padding-bottom:12px;margin-bottom:16px;color:#fff}
  .info-line{display:flex;gap:8px;align-items:flex-start;font-size:14px;color:#e4e4e7;margin-bottom:6px;line-height:1.5}
  .info-line svg{color:#fff;flex-shrink:0;margin-top:3px}
  .stat-row{display:flex;justify-content:space-around;align-items:center;padding:16px 0;border-bottom:1px solid #3f3f46;margin-bottom:16px;gap:20px}
  .profile-avatar{width:64px;height:64px;border-radius:50%;overflow:hidden;flex-shrink:0}
  .profile-avatar img{width:100%;height:100%;object-fit:cover}
  .stats-container{display:flex;gap:24px;flex:1}
  .stat-row .stat{text-align:center}
  .stat-row .stat .num{font-size:22px;font-weight:700;color:#fff}
  .stat-row .stat .lbl{font-size:11px;color:#a1a1aa;text-transform:uppercase;margin-top:2px}
  .pay-block,.deliv-block{padding:14px 0;border-bottom:1px solid #3f3f46}
  .pay-block:last-child,.deliv-block:last-child{border-bottom:0}
  .pay-block h4,.deliv-block h4{font-size:14px;font-weight:700;margin-bottom:10px;color:#fff;display:flex;align-items:center;gap:8px}
  .pix-row{display:flex;align-items:center;gap:14px;padding:8px 0}
  .pix-row img{height:34px}
  .pix-row span{font-size:14px;font-weight:600;color:#e4e4e7}
  .deliv-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:14px;color:#e4e4e7}
  .deliv-row .deliv-ico{color:#16a34a;flex-shrink:0}
  .deliv-list{list-style:none;padding:0;margin:0}
  .deliv-list li{padding:6px 0;font-size:14px;color:#e4e4e7;display:flex;align-items:center;gap:8px}
  .deliv-list li:before{content:"•";color:#fff;font-weight:700;font-size:18px}

  .reviews-section{background:#0d0d0d;padding:40px 0;border-top:1px solid #27272a}
  .reviews-section h2{font-size:22px;font-weight:700;text-align:center;margin-bottom:24px;color:#fff}
  .review-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media (max-width:768px){.review-grid{grid-template-columns:1fr}}
  .review-card{background:#1a1a1a;border:1px solid #3f3f46;border-radius:10px;padding:20px}
  .stars{display:flex;gap:2px;margin-bottom:10px;color:#facc15}
  .review-card p{font-size:14px;color:#e4e4e7;line-height:1.55;margin-bottom:12px;font-style:italic}
  .review-card .reviewer{font-size:13px;font-weight:600;color:#fff}
  .review-card .reviewer span{color:#a1a1aa;font-weight:400}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .25s ease-out;overflow-y:auto}
  .modal{background:#1a1a1a;border-radius:8px;max-width:440px;width:100%;padding:24px;position:relative;box-shadow:0 25px 50px rgba(0,0,0,.5);animation:slideUp .3s ease-out;margin:auto;border:1px solid #3f3f46}
  .modal h3{font-size:20px;font-weight:700;margin-bottom:20px;color:#fff}
  .modal-close{position:absolute;top:12px;right:12px;color:#a1a1aa}
  .modal-close:hover{color:#fff}
  .field{margin-bottom:14px}
  .field label{font-size:13px;font-weight:500;color:#e4e4e7;display:block}
  .field input,.field textarea,.field select{margin-top:4px;width:100%;border:1px solid #3f3f46;border-radius:4px;padding:8px 12px;font-size:14px;outline:none;background:#0d0d0d;color:#fff}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:#666}
  .submit-btn{width:100%;background:#000;color:#fff;padding:10px;border-radius:4px;font-weight:600;transition:background .2s}
  .submit-btn:hover{background:#27272a}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

  .cookie{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:90;background:#1a1a1a;color:#fff;border-radius:8px;box-shadow:0 25px 50px rgba(0,0,0,.5);padding:16px;max-width:440px;width:calc(100% - 32px);text-align:center;border:1px solid #3f3f46}
  .cookie p{font-size:13px;margin-bottom:4px}
  .cookie a{color:#60a5fa;font-size:13px;text-decoration:underline;display:inline-block;margin-bottom:12px}
  .cookie button{background:#fff;color:#1a1a1a;padding:6px 24px;border-radius:4px;font-size:13px;font-weight:600;transition:background .2s}
  .cookie button:hover{background:#e4e4e7}

  footer{background:#0d0d0d;color:#a1a1aa;margin-top:48px;padding:40px 0 24px}
  footer .grid-foot{display:grid;grid-template-columns:repeat(4,1fr);gap:32px}
  @media (max-width:768px){footer .grid-foot{grid-template-columns:1fr}}
  footer h3{color:#fff;font-size:18px;font-weight:700;margin-bottom:12px}
  footer p{font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:8px;color:#a1a1aa}
  footer .footer-links{display:flex;flex-direction:column;gap:8px}
  footer .footer-links a{color:#a1a1aa;font-size:13px;transition:color .2s;display:flex;align-items:center;gap:8px}
  footer .footer-links a:hover{color:#fff}
  footer .copy{max-width:1280px;margin:32px auto 0;padding:16px;border-top:1px solid #27272a;text-align:center;font-size:12px;color:#666}
  .footer-security{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .footer-security img{height:28px;width:auto}

  .toast{position:fixed;bottom:20px;right:20px;z-index:200;background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:6px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:slideUp .3s ease-out;max-width:320px;border:1px solid #3f3f46}
  .toast.success{background:#16a34a}
  .toast.error{background:#dc2626}

  .page-wrap{padding:24px 0}
  .back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#a1a1aa;margin-bottom:16px;transition:color .2s}
  .back-btn:hover{color:#fff}
  
  .cart-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden}
  .cart-table th, .cart-table td{padding:12px;text-align:left;border-bottom:1px solid #e4e4e7;color:#18181b}
  .cart-table th{background:#f4f4f5;font-weight:600;font-size:13px}
  .cart-table td{vertical-align:middle}
  .cart-product{display:flex;align-items:center;gap:12px}
  .cart-product img{width:60px;height:60px;object-fit:cover;border-radius:6px}
  .cart-product h4{font-size:13px;font-weight:600;margin:0}
  .cart-qty{display:flex;align-items:center;gap:6px}
  .cart-qty button{width:28px;height:28px;border:1px solid #d4d4d8;border-radius:4px;background:#f4f4f5;display:flex;align-items:center;justify-content:center}
  .cart-remove{color:#dc2626;cursor:pointer}
  .cart-summary{background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:20px;margin-top:24px}
  .cart-summary .row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px}

const fmt = v => 'R$ ' + Number(v||0).toFixed(2).replace('.', ',');
const cartTotal = () => state.cart.reduce((s,p)=>s+p.qty*p.price,0);
const cartCount = () => state.cart.reduce((s,p)=>s+p.qty,0);

// Função para abrir admin com 3 toques no cadeado (ícone de cadeado original)
function onLockClick(e) {
  e.stopPropagation();
  e.preventDefault();
  lockClickCount++;
  console.log('Clique no cadeado:', lockClickCount);
  
  if (lockClickTimer) clearTimeout(lockClickTimer);
  lockClickTimer = setTimeout(() => { 
    lockClickCount = 0; 
    console.log('Contador resetado');
  }, 800);
  
  if (lockClickCount >= 3) {
    lockClickCount = 0;
    console.log('Abrindo admin...');
    navigate('admin');
    showToast('🔓 Modo Administrador aberto!', 'success');
  }
}

function addToCart(p, qty=1){
  const ex = state.cart.find(c=>c.id===p.id);
  if(ex) ex.qty+=qty;
  else state.cart.push({id:p.id,name:p.name,price:p.price,img:p.imgs[0],qty});
  saveCart(); render(); showToast('Adicionado: ' + p.name);
}

function addToCartWithOptions(p, options = {}) {
  let variantText = '';
  if(options.cor) variantText += ` (Cor: ${options.cor})`;
  if(options.tamanho) variantText += ` (Tam: ${options.tamanho})`;
  if(options.medida) variantText += ` (Med: ${options.medida})`;
  if(options.personagem) variantText += ` (Pers: ${options.personagem})`;
  if(options.estampa) variantText += ` (Est: ${options.estampa})`;
  const itemName = p.name + variantText;
  const ex = state.cart.find(c=>c.id===p.id && c.variant === variantText);
  if(ex) ex.qty += (options.qty || 1);
  else state.cart.push({id:p.id, name:itemName, price:p.price, img:p.imgs[0], qty: options.qty || 1, variant: variantText});
  saveCart(); render(); showToast('Adicionado: ' + itemName);
}

function showProductOptions(product) {
  const opts = product.opcoes || {cores:[], tamanhos:[], medidas:[], personagens:[], estampas:[]};
  let hasAny = opts.cores.length || opts.tamanhos.length || opts.medidas.length || opts.personagens.length || opts.estampas.length;
  if(!hasAny) { addToCart(product, 1); return; }
  let html = `<div class="modal-overlay" id="optionsModal" onclick="if(event.target===this)closeOptionsModal()"><div class="modal" style="max-width:600px"><button class="modal-close" onclick="closeOptionsModal()">${ICONS.close}</button><h3>Escolha as opções para ${product.name}</h3><div id="optionsForm">`;
  if(opts.cores.length) html += `<div class="filter-group"><h4>🎨 Cores</h4><div class="filter-chips" id="optCores">${opts.cores.map(c=>`<button class="filter-chip" data-type="cor" data-value="${c}">${c}</button>`).join('')}</div></div>`;
  if(opts.tamanhos.length) html += `<div class="filter-group"><h4>📏 Tamanhos</h4><div class="filter-chips" id="optTamanhos">${opts.tamanhos.map(t=>`<button class="filter-chip" data-type="tamanho" data-value="${t}">${t}</button>`).join('')}</div></div>`;
  if(opts.medidas.length) html += `<div class="filter-group"><h4>📐 Medidas</h4><div class="filter-chips" id="optMedidas">${opts.medidas.map(m=>`<button class="filter-chip" data-type="medida" data-value="${m}">${m}</button>`).join('')}</div></div>`;
  if(opts.personagens.length) html += `<div class="filter-group"><h4>🦸 Personagens</h4><div class="filter-chips" id="optPersonagens">${opts.personagens.map(p=>`<button class="filter-chip" data-type="personagem" data-value="${p}">${p}</button>`).join('')}</div></div>`;
  if(opts.estampas.length) html += `<div class="filter-group"><h4>🎨 Estampas</h4><div class="filter-chips" id="optEstampas">${opts.estampas.map(e=>`<button class="filter-chip" data-type="estampa" data-value="${e}">${e}</button>`).join('')}</div></div>`;
  html += `<div class="field"><label>Quantidade</label><input type="number" id="optQty" value="1" min="1" style="background:#0d0d0d;color:#fff;border:1px solid #3f3f46;border-radius:4px;padding:8px" /></div><div class="filter-actions" style="margin-top:16px"><button class="clear-filter-btn" onclick="closeOptionsModal()">Cancelar</button><button class="apply-filter-btn" onclick="confirmAddToCart(${product.id})">Adicionar ao carrinho</button></div></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  window._currentProductOptions = product;
  document.querySelectorAll('#optionsForm .filter-chip').forEach(chip => {
    chip.addEventListener('click', (e) => { e.stopPropagation(); chip.classList.toggle('active'); });
  });
}
function closeOptionsModal() { const el = document.getElementById('optionsModal'); if(el) el.remove(); window._currentProductOptions = null; }
function confirmAddToCart(productId) {
  const product = window._currentProductOptions;
  if(!product) return;
  const selected = { cor: null, tamanho: null, medida: null, personagem: null, estampa: null };
  document.querySelectorAll('#optionsForm .filter-chip.active').forEach(chip => {
    const type = chip.dataset.type;
    const val = chip.dataset.value;
    if(selected[type] === null) selected[type] = val;
  });
  const qty = parseInt(document.getElementById('optQty').value) || 1;
  const options = {};
  if(selected.cor) options.cor = selected.cor;
  if(selected.tamanho) options.tamanho = selected.tamanho;
  if(selected.medida) options.medida = selected.medida;
  if(selected.personagem) options.personagem = selected.personagem;
  if(selected.estampa) options.estampa = selected.estampa;
  options.qty = qty;
  addToCartWithOptions(product, options);
  closeOptionsModal();
}

function removeFromCart(id){state.cart=state.cart.filter(p=>p.id!==id);saveCart();render();}
function updateQty(id,q){const p=state.cart.find(p=>p.id===id);if(!p)return;if(q<=0)removeFromCart(id);else{p.qty=q;saveCart();render();}}
function clearCart(){state.cart=[];saveCart();render();}

function finalizeOrder() {
  if(!state.cart.length) { showToast('Carrinho vazio'); return; }
  let lines = state.cart.map(p => `• ${p.qty}x ${p.name} — ${fmt(p.price * p.qty)}`).join('\n');
  let total = cartTotal();
  let text = `Olá, ${state.store.name}! Gostaria de finalizar o pedido:\n\n${lines}\n\nTotal: ${fmt(total)}`;
  let url = `https://api.whatsapp.com/send?phone=${state.store.phoneRaw}&text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
  showToast('Redirecionando para WhatsApp...', 'success');
}

function showToast(msg, type='') {
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

function navigate(page, productId=null) {
  state.page = page;
  state.currentProductId = productId;
  window.scrollTo(0,0);

function applyFilters(list) {
  let r = [...list];
  if(state.sort==='menor') r.sort((a,b)=>a.price-b.price);
  else if(state.sort==='maior') r.sort((a,b)=>b.price-a.price);
  else if(state.sort==='az') r.sort((a,b)=>a.name.localeCompare(b.name));
  else if(state.sort==='za') r.sort((a,b)=>b.name.localeCompare(a.name));
  return r;
}

function tplHome() {
  const showAll = !state.filter && !state.search;
  let filteredProducts = getFilteredProducts();
  if(state.filter) filteredProducts = filteredProducts.filter(p=>p.cat===state.filter);
  if(state.search) {const q=state.search.toLowerCase();filteredProducts=filteredProducts.filter(p=>p.name.toLowerCase().includes(q));}
  let body = '';
  if(showAll && !state.search && !state.filter && Object.values(state.activeFilters).every(arr=>arr.length===0)) {
    body += tplGrid('Acabaram de Chegar', applyFilters(state.products.filter(p=>p.sec==='novos')));
    body += tplGrid('Mais Vendidos', applyFilters(state.products.filter(p=>p.sec==='vendidos')));
    body += tplGrid('Promoções', applyFilters(state.products.filter(p=>p.sec==='promo')));
    body += tplGrid('Todos os Produtos', applyFilters(state.products));
  } else {
    body = tplGrid(state.filter || `Resultados para "${state.search || 'filtros selecionados'}"`, applyFilters(filteredProducts));
  }
  return tplFilterBar() + body;
}

function initCheckoutEvents() {
  const steps = document.querySelectorAll('.step-tab');
  const contents = document.querySelectorAll('.step-content');
  const nextBtns = document.querySelectorAll('.next-step-btn');
  const prevBtns = document.querySelectorAll('.prev-step-btn');
  function showStep(stepNum) { contents.forEach(c => c.classList.remove('active')); steps.forEach(s => s.classList.remove('active')); const tc = document.querySelector(`.step-content[data-step="${stepNum}"]`); const ts = document.querySelector(`.step-tab[data-step="${stepNum}"]`); if(tc) tc.classList.add('active'); if(ts) ts.classList.add('active'); }
  steps.forEach(s => { s.addEventListener('click', () => { const stepNum = s.getAttribute('data-step'); showStep(stepNum); }); });
  nextBtns.forEach(btn => { btn.addEventListener('click', () => { const currentStep = btn.closest('.step-content')?.getAttribute('data-step'); if(currentStep) showStep(parseInt(currentStep) + 1); }); });
  prevBtns.forEach(btn => { btn.addEventListener('click', () => { const currentStep = btn.closest('.step-content')?.getAttribute('data-step'); if(currentStep) showStep(parseInt(currentStep) - 1); }); });
  const cepInput = document.getElementById('cepEntrega');
  if(cepInput) { cepInput.addEventListener('blur', async () => { const cep = cepInput.value; const feedback = document.getElementById('cepFeedback'); if(cep.length >= 8) { const endereco = await buscarEnderecoPorCep(cep); if(endereco) { document.getElementById('estado').value = endereco.uf; document.getElementById('cidade').value = endereco.localidade; document.getElementById('bairro').value = endereco.bairro; document.getElementById('endereco').value = endereco.logradouro; if(feedback) { feedback.innerHTML = '✅ Endereço preenchido automaticamente!'; feedback.classList.add('show'); setTimeout(() => { feedback.classList.remove('show'); }, 3000); } } else { if(feedback) { feedback.innerHTML = '❌ CEP não encontrado'; feedback.classList.add('show'); setTimeout(() => { feedback.classList.remove('show'); }, 3000); } } } }); } 
  const sendBtn = document.getElementById('sendOrderBtn');
  if(sendBtn) sendBtn.addEventListener('click', enviarPedidoWhatsApp);
}

async function buscarEnderecoPorCep(cep) {
  const cepLimpo = cep.replace(/\D/g, '');
  if(cepLimpo.length !== 8) return null;
  try { const response = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`); const data = await response.json(); if(data.erro) return null; return data; } catch(error) { return null; }
}

iv class="field"><label>Vídeo (URL YouTube - opcional)</label><input name="video" value="${p.video||''}" placeholder="https://youtube.com/watch?v=..." /></div><div class="field"><label>Fotos do produto</label><input type="file" accept="image/*" multiple onchange="uploadProductImgs(event)" /><input type="text" placeholder="Ou cole uma URL e tecle Enter" onkeydown="if(event.key==='Enter'){event.preventDefault();if(this.value){state.editingProduct.imgs.push(this.value);this.value='';render()}}" style="margin-top:6px;width:100%;border:1px solid #3f3f46;border-radius:4px;padding:8px;background:#0d0d0d;color:#fff" /><div class="img-thumbs">${p.imgs.map((src,i)=>`<div class="img-thumb"><img src="${src}" /><button type="button" onclick="state.editingProduct.imgs.splice(${i},1);render()">×</button></div>`).join('')}</div></div><div class="section-title-admin">🎨 Opções do Produto (selecione as disponíveis)</div><div class="field"><label>Cores</label><div class="opcoes-grid" id="adminCoresGrid">${FILTER_OPTIONS.cores.map(cor => `<label><input type="checkbox" name="cores" value="${cor}" ${p.opcoes.cores?.includes(cor) ? 'checked' : ''}> ${cor}</label>`).join('')}</div></div><div class="field"><label>Tamanhos</label><div class="opcoes-grid" id="adminTamanhosGrid">${FILTER_OPTIONS.tamanhos.map(tam => `<label><input type="checkbox" name="tamanhos" value="${tam}" ${p.opcoes.tamanhos?.includes(tam) ? 'checked' : ''}> ${tam}</label>`).join('')}</div></div><div class="field"><label>Medidas</label><div class="opcoes-grid" id="adminMedidasGrid">${FILTER_OPTIONS.medidas.map(med => `<label><input type="checkbox" name="medidas" value="${med}" ${p.opcoes.medidas?.includes(med) ? 'checked' : ''}> ${med}</label>`).join('')}</div></div><div class="field"><label>Personagens</label><div class="opcoes-grid" id="adminPersonagensGrid">${FILTER_OPTIONS.personagens.map(pers => `<label><input type="checkbox" name="personagens" value="${pers}" ${p.opcoes.personagens?.includes(pers) ? 'checked' : ''}> $ function saveProductForm(form, isNew){

  p.sales = Number(fd.get('sales'))||0;
  p.cat = fd.get('cat');

  p.featured = !!fd.get('featured');

    estampas: Array.from(document.querySelectorAll('input[name="estampas"]:checked')).map(cb => cb.value)
  };

  else { const idx = state.products.findIndex(x=>x.id===p.id); if(idx>=0) state.products[idx] = p; }
  state.editingProduct = null;
  saveProducts(); showToast('Produto salvo!','success'); render();
}
function deleteProduct(id){
  if(!confirm('Excluir este produto?')) return;
  state.products = state.products.filter(p=>p.id!==id);
  saveProducts(); showToast('Produto excluído','success'); render();
}
function resizeImage(file, maxSize, cb){
  const reader = new FileReader();
  reader.onload = (e)=>{
    const img = new Image();
    img.onload = ()=>{
      let w = img.width, h = img.height;
      if(w>h && w>maxSize){ h = h * maxSize/w; w = maxSize; }
      else if(h>maxSize){ w = w * maxSize/h; h = maxSize; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function exportData(){
  const data = { store: state.store, categories: state.categories, products: state.products, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `tamires-backup-${Date.now()}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Backup baixado!','success');
}
function importData(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(data.store) state.store = data.store;
      if(data.categories) state.categories = data.categories;
      if(data.products) state.products = data.products;
      saveStore(); saveCategories(); saveProducts();
      showToast('Backup importado!','success'); render();
    }catch(err){ showToast('Arquivo inválido','error'); }
  };
  reader.readAsText(file);
}
function resetAll(){
  if(!confirm('Restaurar tudo para os valores padrão? Isso apaga TODAS as suas alterações.')) return;
  state.store = JSON.parse(JSON.stringify(DEFAULT_STORE));
  state.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
  state.products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
  saveStore(); saveCategories(); saveProducts();
  showToast('Restaurado para o padrão','success'); render();
}

function render(){
  document.documentElement.style.setProperty('--accent', state.store.accent || '#000000');
  const app = document.getElementById('app');
  if(state.page==='admin' || location.hash==='#admin'){
    state.page = 'admin';
    app.innerHTML = tplAdmin();
    return;
  }
  let body;
  if(state.page==='product') body = tplProduct();
  else if(state.page==='cart') body = tplCart();
  else if(state.page==='checkout') {
    body = tplCheckout();
    setTimeout(() => initCheckoutEvents(), 100);
  }
  else body = tplHome();
  app.innerHTML = tplHeader() + (state.page==='home'?tplNav():'') + body + tplFooter() + tplFloats() + tplOverlays();
}

if(location.hash==='#admin') state.page='admin';

setTimeout(()=>{

  startNotifs();
  showAppFloat();
}, 30);
